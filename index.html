    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }

  <script src="https://cdn.tailwindcss.com"></script>

    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { themeMain: 'var(--theme-main)' } } }

  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root { --theme-main: #dc2626; } 
    * { font-family:'Prompt', sans-serif; transition: background-color 0.3s, border-color 0.3s; } 
    body { overflow:hidden; overscroll-behavior-y:none; }
    .bg-main { background-color: var(--theme-main); }
    .text-main { color: var(--theme-main); }
    
    /* สไตล์ปุ่มกดด้านข้าง (คอมพิวเตอร์) */
    .sidebar-link { display:flex; align-items:center; gap:.75rem; padding:.7rem 1rem; border-radius:.5rem; color:rgba(255,255,255,0.7); cursor:pointer; }
    .sidebar-link:hover { background:rgba(255,255,255,0.1); color:#fff; } 
    .sidebar-link.active { background:rgba(255,255,255,0.2); color:#fff; border-left: 4px solid #fff; }
    
    .badge { display:inline-flex; align-items:center; padding:.2rem .65rem; border-radius:9999px; font-size:.72rem; font-weight:600; white-space:nowrap; }
    .input { width:100%; padding:.6rem 1rem; border:1px solid #d1d5db; border-radius:.5rem; outline:none; font-size:.875rem; background:transparent; } 
    .input:focus { border-color:var(--theme-main); box-shadow:0 0 0 2px rgba(220,38,38,0.2); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.6rem 1rem; border-radius:.5rem; font-weight:500; cursor:pointer; font-size:.875rem; border:none; transition:0.2s;}
    .btn-primary { background-color: var(--theme-main); color:#fff; } 
    .btn-primary:hover { opacity:0.9; transform:translateY(-1px); }
    .btn-secondary { background:#e5e7eb; color:#374151; } 
    .btn-icon { padding:.4rem .55rem; border-radius:.4rem; cursor:pointer; background:transparent; border:none; transition:0.2s;}
    .btn-icon:hover { background:rgba(0,0,0,0.05); } 
    .loader { border:3px solid #e5e7eb; border-top:3px solid var(--theme-main); border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; }
    @keyframes spin { 0% { transform:rotate(0); } 100% { transform:rotate(360deg); } } 
    .checkbox-wrapper { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .checkbox-wrapper input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--theme-main); cursor: pointer; }
    
    /* กันแถบด้านล่างทับหน้าจอไอโฟน */
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    /* บีบข้อความให้อยู่ใน 2 บรรทัด */
    .truncate-2-lines { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
// ==============================================================================
// 🚨 คำเตือน: นำ URL ของ Google Apps Script ที่ Deploy เสร็จแล้ว มาวางในนี้ 🚨
// ==============================================================================
const API_URL = "https://script.google.com/macros/s/AKfycbwKI4ex2PEHTTxyZlvjOMYeC60BkI8TosYKbJjAr16d0i6-oQanxL0CquzH6GqRm2B7/exec"; 

function gas(fn, ...args) {
  return new Promise(async function(resolve, reject) {
    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ fn: fn, args: args })
      });
      const res = await response.json();
      if (res.status === 'success') { resolve(res.data); } else { reject(new Error(res.message)); }
    } catch (err) { reject(err); }
  });
}

/* ประกาศตัวแปรหลัก */
const State = { user: null, currentPage: 'dashboard', cache: {} };
let activeQrCodeScanner = null;
let deferredPrompt;

function el(id) { return document.getElementById(id); } 
function show(id) { if(el(id)) el(id).classList.remove('hidden'); } 
function hide(id) { if(el(id)) el(id).classList.add('hidden'); }

function toast(msg, type) { 
  const t = el('toast'); 
  t.className = "fixed bottom-6 right-6 md:top-6 md:bottom-auto z-[80] text-white px-5 py-4 rounded-xl shadow-2xl flex items-center gap-3 text-sm "; 
  t.className += (type === 'error' ? 'bg-red-600' : (type === 'warning' ? 'bg-amber-500' : 'bg-emerald-500'));
  t.innerHTML = "<i class='fa-solid " + (type === 'error' ? 'fa-circle-xmark' : 'fa-circle-check') + " text-xl'></i> <span class='font-medium'>" + msg + "</span>"; 
  show('toast'); setTimeout(function() { hide('toast'); }, 3000); 
}

function openModal(title, body, footer, size = 'md') { 
  el('modalTitle').textContent = title; el('modalBody').innerHTML = body; el('modalFooter').innerHTML = footer; 
  el('modalCard').className = "bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full max-h-[90vh] flex flex-col mx-auto animate-[slideUp_0.3s_ease-out] " + (size === 'lg' ? 'max-w-4xl' : 'max-w-xl'); 
  show('modal'); 
}

function closeModal() { 
  hide('modal'); 
  if (activeQrCodeScanner) { try { activeQrCodeScanner.stop().then(function() { activeQrCodeScanner.clear(); activeQrCodeScanner = null; }); } catch(err) {} }
} 

function escapeHtml(text) { return String(text || '').replace(/[&<>"']/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'}[c]; }); }
function errorHtml(error) { return "<div class='bg-white p-8 rounded-2xl text-center text-red-500 border'><i class='fa-solid fa-triangle-exclamation text-4xl mb-4 opacity-70'></i><p>" + escapeHtml(error.message || error) + "</p></div>"; }

function applyAdminTheme(hexColor) { 
  if(!hexColor) hexColor = '#dc2626'; document.documentElement.style.setProperty('--theme-main', hexColor); 
}

/* ระบบ PWA (ปรับแต่งการเด้ง Pop-up) */
window.addEventListener('beforeinstallprompt', function(e) { 
  e.preventDefault(); deferredPrompt = e; 
  if(el('btnInstallPwa')){ el('btnInstallPwa').innerHTML = '<i class="fa-solid fa-download mr-2"></i> ติดตั้งแอปลงมือถือทันที'; el('btnInstallPwa').classList.replace('btn-secondary', 'btn-primary'); } 
});

function handleInstallPwa() {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(choiceResult) { if (choiceResult.outcome === 'accepted') { toast('กำลังติดตั้งแอป...', 'success'); } deferredPrompt = null; }); } 
  else { 
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent || navigator.vendor || window.opera) && !window.MSStream;
    let instructionHtml = isIOS 
      ? `<div class='bg-blue-50 p-4 rounded-xl border border-blue-100 text-left'><p class='font-bold text-blue-700 mb-2'><i class='fa-brands fa-apple text-xl mr-1'></i> สำหรับ iPhone (Safari)</p><ol class='list-decimal pl-5 space-y-1'><li>กดปุ่ม <b>แชร์ (Share)</b> ตรงแถบด้านล่าง</li><li>เลื่อนหาคำว่า <b>เพิ่มไปยังหน้าจอโฮม</b> (Add to Home Screen)</li></ol></div>` 
      : `<div class='bg-green-50 p-4 rounded-xl border border-green-100 text-left'><p class='font-bold text-green-700 mb-2'><i class='fa-brands fa-android text-xl mr-1'></i> สำหรับ Android (Chrome)</p><ol class='list-decimal pl-5 space-y-1'><li>กดปุ่ม <b>เมนูจุด 3 จุด</b> มุมขวาบน</li><li>เลือกเมนู <b>เพิ่มลงในหน้าจอหลัก</b> (Add to Home screen)</li></ol></div>`;
    openModal('📱 วิธีติดตั้งแอป', `<div class='space-y-4 text-sm text-slate-600 text-center'><p class='font-bold text-lg text-slate-800'>สร้างคีย์ลัดไว้ที่หน้าจอมือถือ</p>${instructionHtml}</div>`, "<button onclick='closeModal()' class='btn btn-primary w-full py-2.5'>เข้าใจแล้ว</button>"); 
  }
}

function doLogin() {
  const btn = el('btnLogin'); const err = el('loginError');
  const user = el('loginUser').value.trim(); const pass = el('loginPass').value.trim();
  if (user === '' || pass === '') { err.innerHTML = 'กรุณากรอกข้อมูลให้ครบ'; show('loginError'); return; }
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังตรวจสอบ...'; hide('loginError');

  gas('login', user, pass).then(function(res) {
    if (res.ok) { 
      State.user = res.user; 
      if (el('rememberMe').checked) { localStorage.setItem('user', JSON.stringify(res.user)); } else { sessionStorage.setItem('user', JSON.stringify(res.user)); }
      initApp(); 
    } else { 
      err.textContent = res.message; show('loginError'); btn.disabled = false; btn.innerHTML = 'เข้าสู่ระบบ'; 
    }
  }).catch(function(e) { err.innerHTML = "<b>เกิดข้อผิดพลาดในการเชื่อมต่อ!</b><br>" + e.message + "<br><span class='text-xs text-red-400 mt-2 block'>* ตรวจสอบว่าคุณใส่ API_URL ถูกต้องหรือไม่</span>"; show('loginError'); btn.disabled = false; btn.innerHTML = 'เข้าสู่ระบบ'; });
}

function logout() { sessionStorage.removeItem('user'); localStorage.removeItem('user'); window.location.reload(); }

function updateAvatarUI() {
  if (State.user.Avatar && State.user.Avatar.startsWith('data:image')) { el('sideAvatar').src = State.user.Avatar; show('sideAvatar'); hide('sideAvatarText'); } 
  else { hide('sideAvatar'); show('sideAvatarText'); }
}

async function initApp() {
  hide('loginScreen'); show('app');
  el('userName').textContent = State.user.FullName; updateAvatarUI();
  if (State.user.Role === 'user') { document.querySelectorAll('.admin-only').forEach(function(e) { e.classList.add('hidden'); }); }
  
  document.querySelectorAll('.sidebar-link').forEach(function(l) { l.addEventListener('click', function(e) { e.preventDefault(); navigate(l.dataset.page); }); });
  
  try {
    const [s, cats, locs] = await Promise.all([ gas('getSettings'), gas('getCategories'), gas('getLocations') ]);
    State.cache.settings = s; State.cache.cats = cats; State.cache.locs = locs;
    if(s.theme_color) { applyAdminTheme(s.theme_color); }
    if(s.app_name) { el('appNameDisp').textContent = s.app_name; document.title = s.app_name; }
  } catch(error) { console.error(error); }
  
  navigate('dashboard');
}

const PAGE_INFO = { dashboard:'แดชบอร์ดสรุปผล', products:'รายการสินค้าทั้งหมด', categories:'หมวดหมู่ และ วันเตือน', locations:'สถานที่จัดเก็บ', users:'จัดการพนักงาน', settings:'ตั้งค่าระบบ & LINE', activity:'ประวัติการใช้งาน (Log)' };

/* เปิดหน้าเมนูตั้งค่าสำหรับ Admin ในมือถือ */
function openMobileMenu() {
  let html = '<div class="space-y-3 mt-2">';
  if (State.user.Role === 'admin') {

function compressImage(file, targetInputId, previewImgId) {
  if (!file) return;
  const reader = new FileReader(); reader.readAsDataURL(file);
  reader.onload = function(event) {
    const img = new Image(); img.src = event.target.result;
    img.onload = function() {
      const canvas = document.createElement('canvas'); const MAX_WIDTH = 300; const MAX_HEIGHT = 300; let width = img.width; let height = img.height;
      if (width > height) { if (width > MAX_WIDTH) { height = Math.round(height * (MAX_WIDTH / width)); width = MAX_WIDTH; } } else { if (height > MAX_HEIGHT) { width = Math.round(width * (MAX_HEIGHT / height)); height = MAX_HEIGHT; } }
      canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, width, height); ctx.drawImage(img, 0, 0, width, height);
      const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 
      el(targetInputId).value = compressedBase64; if (el(previewImgId)) { el(previewImgId).src = compressedBase64; show(previewImgId); } if (el('mp_pv_div')) hide('mp_pv_div');
    }
  }
}

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement("a"); link.setAttribute("href", URL.createObjectURL(blob)); link.setAttribute("download", `Urgent_Products_${new Date().toISOString().split('T')[0]}.csv`); link.style.visibility = 'hidden'; document.body.appendChild(link); link.click(); document.body.removeChild(link); toast('ส่งออกไฟล์ CSV สำเร็จ', 'success');

async function saveGPForm(id, btnElement) {

async function render_activity() {
  try {
    const logs = await gas('getActivityLogs');
    let html = `<div class="bg-white rounded-2xl shadow-sm border p-4 md:p-6 mb-4"><h3 class="font-bold text-lg text-slate-700 mb-4 flex items-center"><i class="fa-solid fa-clock-rotate-left text-main mr-2"></i> ประวัติการใช้งาน (Activity Log)</h3><div class="space-y-3">`;

    if (logs.length === 0) {
      html += `<div class="text-center p-10 text-slate-400 bg-slate-50 rounded-xl border border-dashed"><i class="fa-solid fa-folder-open text-4xl mb-3 opacity-50"></i><br>ยังไม่มีประวัติการใช้งาน</div>`;
    } else {
      html += logs.map(function(l) { 
        let dateStr = l.Timestamp; let timeStr = '';
        if(l.Timestamp) { const parts = String(l.Timestamp).split(' '); if(parts.length > 1) { dateStr = parts[0]; timeStr = parts[1]; } }
        let actionColor = 'bg-slate-100 text-slate-700 border-slate-200';
        if (String(l.Action).includes('ลบ')) actionColor = 'bg-red-50 text-red-700 border-red-200';
        else if (String(l.Action).includes('เพิ่ม')) actionColor = 'bg-emerald-50 text-emerald-700 border-emerald-200';
        else if (String(l.Action).includes('แก้ไข') || String(l.Action).includes('จัดการด่วน')) actionColor = 'bg-blue-50 text-blue-700 border-blue-200';
        else if (String(l.Action).includes('เข้าสู่ระบบ')) actionColor = 'bg-purple-50 text-purple-700 border-purple-200';

        return `<div class="bg-white border border-slate-200 rounded-xl p-3.5 shadow-sm hover:border-blue-300 transition-colors"><div class="flex justify-between items-start mb-2.5 border-b border-slate-100 pb-2.5"><div class="flex flex-col"><span class="text-xs font-bold text-slate-700"><i class="fa-regular fa-calendar mr-1.5 text-slate-400"></i>${dateStr}</span><span class="text-[10px] text-slate-500 mt-0.5"><i class="fa-regular fa-clock mr-1.5 text-slate-400"></i>${timeStr || 'ไม่ระบุเวลา'}</span></div><span class="badge ${actionColor} border shadow-sm text-[10px] px-2.5 py-1">${escapeHtml(l.Action)}</span></div><div class="flex items-center gap-2 mb-2"><div class="w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-[10px] text-slate-500 border border-slate-200"><i class="fa-solid fa-user"></i></div><span class="text-sm font-bold text-blue-700">${escapeHtml(l.UserName)}</span></div><div class="text-xs text-slate-600 bg-slate-50 p-2.5 rounded-lg border border-slate-100 leading-relaxed break-words">${escapeHtml(l.Details)}</div></div>`; 
      }).join('');
    }
    html += `</div></div>`;
    el('content').innerHTML = html;
  } catch(e) { el('content').innerHTML = errorHtml(e); }
}

async function render_settings() {

    window.saveSysSet = async function() { el('btnSaveSys').disabled = true; el('btnSaveSys').innerHTML = 'กำลังบันทึก...'; try { await gas('updateSetting', 'app_name', el('set_app').value, State.user); await gas('updateSetting', 'theme_color', el('set_color').value, State.user); await gas('updateSetting', 'line_token', el('set_line').value, State.user); await gas('updateSetting', 'line_chat_id', el('set_chat').value, State.user); applyAdminTheme(el('set_color').value); toast('บันทึกสำเร็จ','success'); el('btnSaveSys').disabled = false; el('btnSaveSys').innerHTML = 'บันทึกการตั้งค่า'; } catch(e) { toast(e.message, 'error'); el('btnSaveSys').disabled = false; } };
  } catch(e) { el('content').innerHTML = errorHtml(e); }
}

window.addEventListener('DOMContentLoaded', function() { 
  const userInp = el('loginUser'); const passInp = el('loginPass');
  if (userInp && passInp) { userInp.focus(); userInp.addEventListener('keydown', function(e) { if (e.key === 'Enter') passInp.focus(); }); passInp.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); }); }
  try { const u = localStorage.getItem('user') || sessionStorage.getItem('user'); if (u) { State.user = JSON.parse(u); initApp(); return; } } catch(e) { sessionStorage.removeItem('user'); localStorage.removeItem('user'); }
});
</script>
